<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#F4F7FC" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="IRONLOG" />
<title>IRONLOG</title>
<style>html,body{margin:0;padding:0;background:#F4F7FC;}</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.tailwindcss.com"></script>

<body>
<div id="root"></div>

<script>
/* ---- localStorage shim: lets the original app persist offline, no Claude needed.
   Namespaced with 'ironlog:' so it never collides with the other bundled apps. ---- */
window.storage = (function (prefix) {
  return {
    get: async function (k) { try { var v = localStorage.getItem(prefix + k); return v === null ? null : { value: v }; } catch (e) { return null; } },
    set: async function (k, val) { try { localStorage.setItem(prefix + k, val); } catch (e) {} return { value: val }; },
  };
})('ironlog:');

/* ---- home-screen icon (generated, no external files) ---- */
function _rr(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}
function _mkIcon(s){
  var c=document.createElement('canvas');c.width=s;c.height=s;var x=c.getContext('2d');
  _rr(x,0,0,s,s,s*0.22);x.fillStyle='#2563EB';x.fill();
  x.strokeStyle='#fff';x.lineCap='round';var y=s*0.5;
  x.lineWidth=s*0.06;x.beginPath();x.moveTo(s*0.3,y);x.lineTo(s*0.7,y);x.stroke();
  x.lineWidth=s*0.055;[0.27,0.73].forEach(function(px){x.beginPath();x.moveTo(s*px,y-s*0.12);x.lineTo(s*px,y+s*0.12);x.stroke();});
  [0.21,0.79].forEach(function(px){x.beginPath();x.moveTo(s*px,y-s*0.075);x.lineTo(s*px,y+s*0.075);x.stroke();});
  return c.toDataURL('image/png');
}
try{
  var _a=document.createElement('link');_a.rel='apple-touch-icon';_a.href=_mkIcon(180);document.head.appendChild(_a);
  var _f=document.createElement('link');_f.rel='icon';_f.href=_mkIcon(64);document.head.appendChild(_f);
  var _m={name:'IRONLOG',short_name:'IRONLOG',display:'standalone',background_color:'#F4F7FC',theme_color:'#F4F7FC',start_url:'.',icons:[{src:_mkIcon(192),sizes:'192x192',type:'image/png'},{src:_mkIcon(512),sizes:'512x512',type:'image/png'}]};
  var _mb=new Blob([JSON.stringify(_m)],{type:'application/manifest+json'});var _ml=document.createElement('link');_ml.rel='manifest';_ml.href=URL.createObjectURL(_mb);document.head.appendChild(_ml);
}catch(e){}
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* ---- inline icons (replacing lucide-react) ---- */
const _mkI = (paths) => ({ size = 24, color = 'currentColor', strokeWidth = 2, style, ...rest }) =>
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style} {...rest}>{paths}</svg>;
const Dumbbell = _mkI(<><path d="M6 9v6"/><path d="M3 10v4"/><path d="M18 9v6"/><path d="M21 10v4"/><path d="M6 12h12"/></>);
const BarChart3 = _mkI(<><path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-8"/><path d="M4 20h16"/></>);
const ClipboardList = _mkI(<><rect x="6" y="4" width="12" height="16" rx="2"/><path d="M9 4V3h6v1"/><path d="M9 9h6"/><path d="M9 13h6"/><path d="M9 17h4"/></>);
const TrendingUp = _mkI(<><path d="M3 17l6-6 4 4 7-7"/><path d="M17 8h4v4"/></>);
const TrendingDown = _mkI(<><path d="M3 7l6 6 4-4 7 7"/><path d="M17 16h4v-4"/></>);
const Minus = _mkI(<path d="M5 12h14"/>);
const Trash2 = _mkI(<><path d="M4 7h16"/><path d="M9 7V5h6v2"/><path d="M6 7l1 13h10l1-13"/><path d="M10 11v6"/><path d="M14 11v6"/></>);
const Pencil = _mkI(<><path d="M4 20h4L19 9l-4-4L4 16v4z"/><path d="M14 6l4 4"/></>);
const Plus = _mkI(<><path d="M12 5v14"/><path d="M5 12h14"/></>);
const Check = _mkI(<path d="M5 12l5 5L20 7"/>);

// ---- Palette: white + blue. green=stronger, rose=lighter ----
const C = {
  bg: '#F4F7FC', surface: '#FFFFFF', surface2: '#EEF2F9', line: '#D9E2EF',
  text: '#15243A', muted: '#5C6B82', faint: '#8A94A6', accent: '#2563EB', onAccent: '#FFFFFF',
  up: '#0E9F6E', down: '#E11D48',
};
const CARD_SHADOW = '0 1px 2px rgba(20, 45, 90, 0.05)';

// ---- Default exercises (editable; persisted once changed) ----
const DEFAULT_EXERCISES = [
  { name: 'Chest Press', group: 'Chest' }, { name: 'Incline Smith Press', group: 'Chest' },
  { name: 'Wide-Grip Lat Pulldown', group: 'Back' }, { name: 'Close-Grip Cable Row', group: 'Back' }, { name: 'Machine Row', group: 'Back' }, { name: 'Chest-Supported Row', group: 'Back' },
  { name: 'Shoulder Press', group: 'Shoulders' }, { name: 'Lateral Raises', group: 'Shoulders' }, { name: 'Rear Delt Cable', group: 'Shoulders' },
  { name: 'Preacher Curl', group: 'Arms' }, { name: 'Bayesian Curl', group: 'Arms' }, { name: 'Hammer Curl', group: 'Arms' }, { name: 'Tricep Pushdown', group: 'Arms' }, { name: 'Overhead Tricep Extension', group: 'Arms' },
  { name: 'Leg Press', group: 'Legs' }, { name: 'RDL', group: 'Legs' }, { name: 'Hip Thrust', group: 'Legs' }, { name: 'Leg Curl', group: 'Legs' }, { name: 'Leg Extension', group: 'Legs' }, { name: 'Adductor', group: 'Legs' }, { name: 'Calves', group: 'Legs' },
];
const GROUP_ORDER = ['Chest', 'Back', 'Shoulders', 'Arms', 'Legs', 'Other'];

const LBS_PER_KG = 2.20462;
const DAY = 86400000;

const pad = (n) => String(n).padStart(2, '0');
const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; };
const dateToMs = (s) => new Date(s + 'T00:00:00').getTime();
const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
const fmt = (n) => { if (n == null || isNaN(n)) return '—'; const r = Math.round(n * 10) / 10; return Number.isInteger(r) ? String(r) : r.toFixed(1); };
const convert = (w, from, to) => from === to ? w : (to === 'kg' ? w / LBS_PER_KG : w * LBS_PER_KG);
const prettyDate = (s) => { const d = new Date(s + 'T00:00:00'); return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }); };

const store = {
  async get(k) { try { if (!window.storage) return null; const r = await window.storage.get(k); return r ? JSON.parse(r.value) : null; } catch { return null; } },
  async set(k, v) { try { if (!window.storage) return; await window.storage.set(k, JSON.stringify(v)); } catch (e) { console.error('save failed', e); } },
};

function Sparkline({ data }) {
  if (!data || data.length < 2) return null;
  const w = 76, h = 26, p = 3;
  const min = Math.min(...data), max = Math.max(...data), rng = (max - min) || 1;
  const pts = data.map((v, i) => [p + (i / (data.length - 1)) * (w - 2 * p), h - p - ((v - min) / rng) * (h - 2 * p)]);
  const d = 'M' + pts.map((pt) => `${pt[0].toFixed(1)},${pt[1].toFixed(1)}`).join(' L');
  const col = data[data.length - 1] >= data[0] ? C.up : C.down;
  return (
    <svg width={w} height={h} style={{ display: 'block' }} aria-hidden="true">
      <path d={d} fill="none" stroke={col} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r="2.2" fill={col} />
    </svg>
  );
}

function Delta({ value, unit }) {
  if (value == null) return <span className="font-mono text-xs" style={{ color: C.faint }}>no prior week</span>;
  const flat = Math.abs(value) < 0.05;
  const up = value > 0;
  const col = flat ? C.muted : up ? C.up : C.down;
  const Icon = flat ? Minus : up ? TrendingUp : TrendingDown;
  const sign = flat ? '' : up ? '+' : '−';
  return (
    <span className="inline-flex items-center gap-1 font-mono font-semibold" style={{ color: col, fontSize: 15 }}>
      <Icon size={15} strokeWidth={2.5} /> {sign}{fmt(Math.abs(value))}<span style={{ color: C.faint, fontWeight: 400 }}>{unit}</span>
    </span>
  );
}

function UnitToggle({ value, onChange }) {
  return (
    <div className="inline-flex rounded-full" style={{ background: C.surface2, border: `1px solid ${C.line}`, padding: 2 }}>
      {['kg', 'lb'].map((u) => {
        const v = u === 'lb' ? 'lbs' : 'kg';
        const active = value === v;
        return (
          <button key={u} onClick={() => onChange(v)} className="font-mono font-semibold rounded-full"
            style={{ fontSize: 11, padding: '3px 10px', color: active ? C.onAccent : C.muted, background: active ? C.accent : 'transparent', transition: 'all .15s' }}>
            {u.toUpperCase()}
          </button>
        );
      })}
    </div>
  );
}

const TABS = [
  { id: 'log', icon: Dumbbell, label: 'Log' },
  { id: 'progress', icon: BarChart3, label: 'Progress' },
  { id: 'history', icon: ClipboardList, label: 'History' },
];

function App() {
  const [workouts, setWorkouts] = useState([]);
  const [units, setUnits] = useState({});
  const [exercises, setExercises] = useState(DEFAULT_EXERCISES);
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState('log');

  const [logDate, setLogDate] = useState(todayStr());
  const [draft, setDraft] = useState({});
  const [saveState, setSaveState] = useState('saved'); // 'saved' | 'saving'
  const [confirmReset, setConfirmReset] = useState(false);

  // edit-exercises mode + add form
  const [editMode, setEditMode] = useState(false);
  const [newName, setNewName] = useState('');
  const [newGroup, setNewGroup] = useState('Chest');
  const [addError, setAddError] = useState('');

  const allEx = useMemo(() => exercises.map((e) => e.name), [exercises]);
  const groupOf = useMemo(() => { const m = {}; exercises.forEach((e) => { m[e.name] = e.group; }); return m; }, [exercises]);
  const groupsToShow = useMemo(() => GROUP_ORDER.map((g) => ({ name: g, items: exercises.filter((e) => e.group === g) })).filter((g) => g.items.length > 0), [exercises]);

  const buildDraft = (session) => {
    const d = {};
    if (session) for (const e of session.entries) d[e.exercise] = { weight: String(e.weight), reps: e.reps != null ? String(e.reps) : '' };
    return d;
  };

  // load once
  useEffect(() => {
    (async () => {
      const w = await store.get('workouts'); const list = Array.isArray(w) ? w : [];
      const u = await store.get('units');
      const ex = await store.get('exercises');
      setWorkouts(list);
      if (u && typeof u === 'object') setUnits(u);
      if (Array.isArray(ex) && ex.length) setExercises(ex);
      setDraft(buildDraft(list.find((x) => x.date === todayStr())));
      setLoaded(true);
    })();
  }, []);

  // persist
  useEffect(() => { if (loaded) store.set('workouts', workouts); }, [workouts, loaded]);
  useEffect(() => { if (loaded) store.set('units', units); }, [units, loaded]);
  useEffect(() => { if (loaded) store.set('exercises', exercises); }, [exercises, loaded]);

  // auto-save: commit the draft into the selected date's session whenever it changes (debounced)
  useEffect(() => {
    if (!loaded) return;
    const handle = setTimeout(() => {
      const entries = allEx
        .filter((ex) => draft[ex] && draft[ex].weight !== '' && draft[ex].weight != null && !isNaN(Number(draft[ex].weight)))
        .map((ex) => ({ exercise: ex, weight: Number(draft[ex].weight), unit: units[ex] || 'kg', reps: draft[ex].reps && !isNaN(Number(draft[ex].reps)) ? Number(draft[ex].reps) : null }));
      setWorkouts((prev) => {
        const existing = prev.find((w) => w.date === logDate);
        if (entries.length === 0) return existing ? prev.filter((w) => w.date !== logDate) : prev;
        const session = { id: existing ? existing.id : uid(), date: logDate, entries };
        return prev.filter((w) => w.date !== logDate).concat(session);
      });
      setSaveState('saved');
    }, 500);
    return () => clearTimeout(handle);
  }, [draft, logDate, units, allEx, loaded]);

  const unitFor = (ex) => units[ex] || 'kg';
  const setUnitFor = (ex, u) => setUnits((prev) => ({ ...prev, [ex]: u }));

  // most recent entry for an exercise, ignoring the date currently being edited
  const lastEntryFor = (ex) => {
    let best = null;
    for (const w of workouts) {
      if (w.date === logDate) continue;
      const e = w.entries.find((en) => en.exercise === ex);
      if (e) { const t = dateToMs(w.date); if (!best || t > best.t) best = { t, weight: convert(e.weight, e.unit || 'kg', unitFor(ex)), reps: e.reps, date: w.date }; }
    }
    return best;
  };

  const changeDate = (d) => { setLogDate(d); setDraft(buildDraft(workouts.find((w) => w.date === d))); };
  const updateDraft = (ex, field, val) => { setSaveState('saving'); setDraft((d) => ({ ...d, [ex]: { ...d[ex], [field]: val } })); };

  const addExercise = () => {
    const trimmed = newName.trim();
    if (!trimmed) return;
    if (exercises.some((e) => e.name.toLowerCase() === trimmed.toLowerCase())) { setAddError('That exercise already exists.'); return; }
    setExercises((prev) => [...prev, { name: trimmed, group: newGroup }]);
    setNewName(''); setAddError('');
  };
  const deleteExercise = (name) => {
    setExercises((prev) => prev.filter((e) => e.name !== name));
    setDraft((d) => { const n = { ...d }; delete n[name]; return n; });
  };

  const deleteSession = (id) => setWorkouts((prev) => prev.filter((w) => w.id !== id));
  const editSession = (w) => { setLogDate(w.date); setDraft(buildDraft(w)); setEditMode(false); setTab('log'); };
  const resetAll = () => { setWorkouts([]); setDraft({}); setConfirmReset(false); };

  const stats = useMemo(() => {
    const now = dateToMs(todayStr());
    const out = {};
    for (const ex of allEx) {
      const u = units[ex] || 'kg';
      const entries = [];
      for (const w of workouts) { const e = w.entries.find((en) => en.exercise === ex); if (e) entries.push({ t: dateToMs(w.date), weight: convert(e.weight, e.unit || 'kg', u) }); }
      entries.sort((a, b) => a.t - b.t);
      const avg = (arr) => arr.length ? arr.reduce((s, e) => s + e.weight, 0) / arr.length : null;
      const tw = avg(entries.filter((e) => e.t >= now - 6 * DAY));
      const lw = avg(entries.filter((e) => e.t >= now - 13 * DAY && e.t <= now - 7 * DAY));
      out[ex] = {
        unit: u, count: entries.length, last: entries.length ? entries[entries.length - 1] : null,
        sevenDay: avg(entries.filter((e) => e.t >= now - 6 * DAY)),
        monthly: avg(entries.filter((e) => e.t >= now - 29 * DAY)),
        wow: (tw != null && lw != null) ? tw - lw : null,
        trend: entries.slice(-12).map((e) => e.weight),
      };
    }
    return out;
  }, [workouts, units, allEx]);

  const trained = allEx.filter((ex) => stats[ex] && stats[ex].count > 0).sort((a, b) => (stats[b].last?.t || 0) - (stats[a].last?.t || 0));
  const now = dateToMs(todayStr());
  const weekCount = workouts.filter((w) => dateToMs(w.date) >= now - 6 * DAY).length;

  const wrap = { background: C.bg, color: C.text, minHeight: '100vh', fontFamily: 'system-ui, -apple-system, "Segoe UI", Roboto, sans-serif' };
  const inner = { maxWidth: 540, margin: '0 auto', padding: '0 14px 96px' };
  const card = { background: C.surface, border: `1px solid ${C.line}`, borderRadius: 14, boxShadow: CARD_SHADOW };
  const inputBase = { background: C.surface2, border: `1px solid ${C.line}`, color: C.text, borderRadius: 10, padding: '10px 12px', fontFamily: 'ui-monospace, "SF Mono", Menlo, Consolas, monospace', outline: 'none' };

  if (!loaded) return <div style={{ ...wrap, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><span style={{ color: C.muted }}>Loading…</span></div>;

  return (
    <div style={wrap}>
      <style>{`
        *:focus-visible{ outline:2px solid ${C.accent}; outline-offset:2px; }
        input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
        input[type=number]{ -moz-appearance:textfield; }
        input::placeholder{ color:${C.faint}; }
        input[type=date]{ color-scheme:light; }
        @media (prefers-reduced-motion: reduce){ *{ transition:none!important; animation:none!important; } }
      `}</style>

      <div style={inner}>
        <div className="flex items-center gap-2" style={{ padding: '20px 0 14px' }}>
          <div className="inline-flex items-center justify-center" style={{ width: 34, height: 34, borderRadius: 9, background: C.accent }}>
            <Dumbbell size={20} color={C.onAccent} strokeWidth={2.6} />
          </div>
          <div>
            <div className="font-mono font-bold" style={{ fontSize: 17, letterSpacing: 1, color: C.text }}>IRONLOG</div>
            <div style={{ fontSize: 11, color: C.faint, marginTop: -1 }}>Strength tracker</div>
          </div>
        </div>
      </div>

      <div style={inner}>
        {/* ---------------- LOG ---------------- */}
        {tab === 'log' && (
          <div>
            <div className="flex items-center justify-between gap-3" style={{ ...card, padding: 12 }}>
              <label style={{ fontSize: 12, color: C.muted, fontWeight: 600 }}>Date</label>
              <input type="date" value={logDate} max={todayStr()} onChange={(e) => changeDate(e.target.value)} style={{ ...inputBase, padding: '8px 10px', fontSize: 14 }} />
            </div>

            <div className="flex items-center justify-between" style={{ margin: '14px 2px 8px' }}>
              <span style={{ fontSize: 12, color: C.muted, fontWeight: 600 }}>
                {editMode ? 'Add or remove exercises' : (saveState === 'saving' ? 'Saving…' : '✓ All changes saved')}
              </span>
              <button onClick={() => { setEditMode(!editMode); setAddError(''); }} style={{ fontSize: 12.5, fontWeight: 700, color: C.accent }}>
                {editMode ? 'Done' : 'Edit'}
              </button>
            </div>

            {groupsToShow.map((g) => (
              <div key={g.name}>
                <div className="flex items-center gap-3" style={{ margin: '16px 0 10px' }}>
                  <span className="font-mono font-bold" style={{ fontSize: 12, letterSpacing: 1.5, color: C.accent }}>{g.name.toUpperCase()}</span>
                  <div style={{ flex: 1, height: 1, background: C.line }} />
                </div>
                {g.items.map((item) => {
                  const ex = item.name;
                  if (editMode) {
                    return (
                      <div key={ex} className="flex items-center justify-between gap-2" style={{ ...card, padding: '11px 12px', marginBottom: 8 }}>
                        <span style={{ fontWeight: 600, fontSize: 14 }}>{ex}</span>
                        <button onClick={() => deleteExercise(ex)} className="inline-flex items-center justify-center" style={{ width: 32, height: 32, borderRadius: 8, background: C.surface2, color: C.down }} aria-label={`Delete ${ex}`}><Trash2 size={15} /></button>
                      </div>
                    );
                  }
                  const last = lastEntryFor(ex);
                  const u = unitFor(ex);
                  return (
                    <div key={ex} style={{ ...card, padding: 12, marginBottom: 10 }}>
                      <div className="flex items-center justify-between gap-2" style={{ marginBottom: 9 }}>
                        <span style={{ fontWeight: 600, fontSize: 14 }}>{ex}</span>
                        <UnitToggle value={u} onChange={(nu) => setUnitFor(ex, nu)} />
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="flex items-center gap-1" style={{ flex: 1 }}>
                          <input inputMode="decimal" type="number" value={draft[ex]?.weight ?? ''} onChange={(e) => updateDraft(ex, 'weight', e.target.value)}
                            placeholder={last ? fmt(last.weight) : 'weight'} style={{ ...inputBase, width: '100%', fontSize: 18, fontWeight: 700, textAlign: 'center' }} />
                          <span className="font-mono" style={{ fontSize: 12, color: C.faint, width: 22 }}>{u}</span>
                        </div>
                        <input inputMode="numeric" type="number" value={draft[ex]?.reps ?? ''} onChange={(e) => updateDraft(ex, 'reps', e.target.value)}
                          placeholder="reps" style={{ ...inputBase, width: 84, fontSize: 14, textAlign: 'center' }} />
                      </div>
                      {last && (
                        <div style={{ fontSize: 11, color: C.faint, marginTop: 7 }}>
                          Last · {fmt(last.weight)} {u}{last.reps ? ` × ${last.reps}` : ''} · {prettyDate(last.date)}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}

            {editMode ? (
              <div style={{ ...card, padding: 14, marginTop: 18 }}>
                <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>Add an exercise</div>
                <input value={newName} onChange={(e) => { setNewName(e.target.value); setAddError(''); }} placeholder="Exercise name"
                  style={{ ...inputBase, fontFamily: 'inherit', width: '100%', fontSize: 14, marginBottom: 10 }} />
                <div className="flex flex-wrap gap-2" style={{ marginBottom: 12 }}>
                  {GROUP_ORDER.map((g) => {
                    const active = newGroup === g;
                    return (
                      <button key={g} onClick={() => setNewGroup(g)} style={{ fontSize: 12, fontWeight: 600, padding: '6px 12px', borderRadius: 999, border: `1px solid ${active ? C.accent : C.line}`, background: active ? C.accent : C.surface, color: active ? C.onAccent : C.muted }}>{g}</button>
                    );
                  })}
                </div>
                {addError && <div style={{ fontSize: 12, color: C.down, marginBottom: 10 }}>{addError}</div>}
                <button onClick={addExercise} disabled={!newName.trim()} className="w-full inline-flex items-center justify-center gap-2 font-semibold"
                  style={{ padding: '12px', borderRadius: 11, background: newName.trim() ? C.accent : C.surface2, color: newName.trim() ? C.onAccent : C.faint, fontSize: 14 }}>
                  <Plus size={17} strokeWidth={2.6} /> Add exercise
                </button>
              </div>
            ) : (
              <div style={{ fontSize: 11.5, color: C.faint, textAlign: 'center', marginTop: 16, lineHeight: 1.5 }}>
                Logs save automatically as you type — enter one exercise at a time, even mid-workout.
              </div>
            )}
          </div>
        )}

        {/* ---------------- PROGRESS ---------------- */}
        {tab === 'progress' && (
          <div>
            <div className="flex gap-2" style={{ marginBottom: 14 }}>
              <div style={{ ...card, padding: '12px 14px', flex: 1 }}>
                <div className="font-mono font-bold" style={{ fontSize: 22, color: C.accent }}>{weekCount}</div>
                <div style={{ fontSize: 11, color: C.muted }}>sessions · last 7 days</div>
              </div>
              <div style={{ ...card, padding: '12px 14px', flex: 1 }}>
                <div className="font-mono font-bold" style={{ fontSize: 22 }}>{workouts.length}</div>
                <div style={{ fontSize: 11, color: C.muted }}>sessions · all time</div>
              </div>
            </div>

            {trained.length === 0 ? (
              <div style={{ ...card, padding: 28, textAlign: 'center' }}>
                <BarChart3 size={26} color={C.faint} style={{ margin: '0 auto 10px' }} />
                <div style={{ color: C.muted, fontSize: 14 }}>No lifts logged yet.</div>
                <div style={{ color: C.faint, fontSize: 12, marginTop: 4 }}>Log a session and your averages and weekly change show up here.</div>
              </div>
            ) : (
              trained.map((ex) => {
                const s = stats[ex];
                return (
                  <div key={ex} style={{ ...card, padding: 14, marginBottom: 10 }}>
                    <div className="flex items-start justify-between gap-3" style={{ marginBottom: 10 }}>
                      <div style={{ minWidth: 0 }}>
                        <div style={{ fontWeight: 600, fontSize: 14 }}>{ex}</div>
                        <div className="font-mono" style={{ fontSize: 10.5, color: C.faint, letterSpacing: 0.5, marginBottom: 5 }}>{(groupOf[ex] || '').toUpperCase()}</div>
                        <Delta value={s.wow} unit={s.unit} />
                        <div style={{ fontSize: 11, color: C.faint, marginTop: 2 }}>vs. previous week</div>
                      </div>
                      <Sparkline data={s.trend} />
                    </div>
                    <div className="flex gap-2" style={{ borderTop: `1px solid ${C.line}`, paddingTop: 10 }}>
                      <div style={{ flex: 1 }}>
                        <div className="font-mono font-bold" style={{ fontSize: 17 }}>{fmt(s.sevenDay)} <span style={{ fontSize: 11, color: C.faint, fontWeight: 400 }}>{s.unit}</span></div>
                        <div style={{ fontSize: 10.5, color: C.muted, letterSpacing: 0.4 }}>7-DAY AVG</div>
                      </div>
                      <div style={{ flex: 1 }}>
                        <div className="font-mono font-bold" style={{ fontSize: 17 }}>{fmt(s.monthly)} <span style={{ fontSize: 11, color: C.faint, fontWeight: 400 }}>{s.unit}</span></div>
                        <div style={{ fontSize: 10.5, color: C.muted, letterSpacing: 0.4 }}>30-DAY AVG</div>
                      </div>
                      <div style={{ flex: 1 }}>
                        <div className="font-mono font-bold" style={{ fontSize: 17 }}>{fmt(s.last?.weight)} <span style={{ fontSize: 11, color: C.faint, fontWeight: 400 }}>{s.unit}</span></div>
                        <div style={{ fontSize: 10.5, color: C.muted, letterSpacing: 0.4 }}>LATEST</div>
                      </div>
                    </div>
                  </div>
                );
              })
            )}
          </div>
        )}

        {/* ---------------- HISTORY ---------------- */}
        {tab === 'history' && (
          <div>
            {workouts.length === 0 ? (
              <div style={{ ...card, padding: 28, textAlign: 'center' }}>
                <ClipboardList size={26} color={C.faint} style={{ margin: '0 auto 10px' }} />
                <div style={{ color: C.muted, fontSize: 14 }}>No sessions logged.</div>
                <div style={{ color: C.faint, fontSize: 12, marginTop: 4 }}>Head to Log to record your first workout.</div>
              </div>
            ) : (
              [...workouts].sort((a, b) => dateToMs(b.date) - dateToMs(a.date)).map((w) => (
                <div key={w.id} style={{ ...card, padding: 13, marginBottom: 10 }}>
                  <div className="flex items-center justify-between gap-2" style={{ marginBottom: 8 }}>
                    <div>
                      <div style={{ fontWeight: 600, fontSize: 14 }}>{prettyDate(w.date)}</div>
                      <div className="font-mono" style={{ fontSize: 11.5, color: C.accent }}>{w.entries.length} exercise{w.entries.length !== 1 ? 's' : ''}</div>
                    </div>
                    <div className="flex gap-1">
                      <button onClick={() => editSession(w)} className="inline-flex items-center justify-center" style={{ width: 32, height: 32, borderRadius: 8, background: C.surface2, color: C.muted }} aria-label="Edit session"><Pencil size={15} /></button>
                      <button onClick={() => deleteSession(w.id)} className="inline-flex items-center justify-center" style={{ width: 32, height: 32, borderRadius: 8, background: C.surface2, color: C.down }} aria-label="Delete session"><Trash2 size={15} /></button>
                    </div>
                  </div>
                  <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 8 }}>
                    {w.entries.map((e) => (
                      <div key={e.exercise} className="flex items-center justify-between" style={{ padding: '3px 0', fontSize: 13 }}>
                        <span style={{ color: C.muted }}>{e.exercise}</span>
                        <span className="font-mono" style={{ color: C.text }}>{fmt(e.weight)} {e.unit}{e.reps ? <span style={{ color: C.faint }}> × {e.reps}</span> : ''}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))
            )}

            {workouts.length > 0 && (
              <div style={{ marginTop: 18, textAlign: 'center' }}>
                {confirmReset ? (
                  <div style={{ ...card, padding: 14 }}>
                    <div style={{ fontSize: 13, color: C.text, marginBottom: 10 }}>Delete every logged session? This can't be undone.</div>
                    <div className="flex gap-2">
                      <button onClick={() => setConfirmReset(false)} className="flex-1" style={{ padding: '10px', borderRadius: 9, background: C.surface2, color: C.text, fontSize: 13, fontWeight: 600 }}>Keep my data</button>
                      <button onClick={resetAll} className="flex-1" style={{ padding: '10px', borderRadius: 9, background: C.down, color: C.onAccent, fontSize: 13, fontWeight: 700 }}>Delete all</button>
                    </div>
                  </div>
                ) : (
                  <button onClick={() => setConfirmReset(true)} style={{ fontSize: 12, color: C.faint, padding: 8 }}>Reset all data</button>
                )}
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, background: C.surface, borderTop: `1px solid ${C.line}` }}>
        <div className="flex" style={{ maxWidth: 540, margin: '0 auto' }}>
          {TABS.map((t) => {
            const active = tab === t.id; const Icon = t.icon;
            return (
              <button key={t.id} onClick={() => setTab(t.id)} className="flex-1 inline-flex flex-col items-center justify-center gap-1" style={{ padding: '9px 0', color: active ? C.accent : C.muted, transition: 'color .15s' }}>
                <Icon size={20} strokeWidth={active ? 2.4 : 2} />
                <span style={{ fontSize: 11, fontWeight: active ? 700 : 500 }}>{t.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
