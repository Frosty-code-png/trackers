<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#F4F7FC" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="IRONLOG" />
<title>IRONLOG</title>
<style>
  *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  :root{
    --bg:#F4F7FC;--surface:#FFFFFF;--surface2:#EEF2F9;--line:#D9E2EF;
    --text:#15243A;--muted:#5C6B82;--faint:#8A94A6;--accent:#2563EB;--on:#FFFFFF;
    --up:#0E9F6E;--down:#E11D48;
    --mono:ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  body{font-family:var(--sans);color:var(--text);background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased;}
  .app{max-width:540px;margin:0 auto;padding:0 14px calc(96px + env(safe-area-inset-bottom));}
  .head{display:flex;align-items:center;gap:10px;padding:calc(20px + env(safe-area-inset-top)) 0 14px;}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);display:grid;place-items:center;color:#fff;}
  .logo svg{width:20px;height:20px;}
  .brand{font-family:var(--mono);font-weight:700;font-size:17px;letter-spacing:1px;color:var(--text);}
  .brand-sub{font-size:11px;color:var(--faint);margin-top:-1px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 2px rgba(20,45,90,.05);}
  .input{background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:10px 12px;font-family:var(--mono);outline:none;}
  .input:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  input[type=number]{-moz-appearance:textfield;}
  input[type=date]{color-scheme:light;}
  input::placeholder{color:var(--faint);}
  button{font-family:var(--sans);}

  .daterow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px;}
  .daterow label{font-size:12px;color:var(--muted);font-weight:600;}
  .daterow input{padding:8px 10px;font-size:14px;}
  .statusrow{display:flex;align-items:center;justify-content:space-between;margin:14px 2px 8px;}
  .statusrow span{font-size:12px;color:var(--muted);font-weight:600;}
  .editbtn{font-size:12.5px;font-weight:700;color:var(--accent);background:none;border:none;cursor:pointer;}

  .grouphd{display:flex;align-items:center;gap:12px;margin:16px 0 10px;}
  .grouphd .g{font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:1.5px;color:var(--accent);}
  .grouphd .ln{flex:1;height:1px;background:var(--line);}

  .exc{padding:12px;margin-bottom:10px;}
  .exc-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px;}
  .exc-name{font-weight:600;font-size:14px;}
  .exc-in{display:flex;align-items:center;gap:8px;}
  .exc-w{display:flex;align-items:center;gap:4px;flex:1;}
  .exc-w input{width:100%;font-size:18px;font-weight:700;text-align:center;}
  .exc-w .u{font-family:var(--mono);font-size:12px;color:var(--faint);width:24px;}
  .exc-reps{width:84px;font-size:14px;text-align:center;}
  .exc-last{font-size:11px;color:var(--faint);margin-top:7px;}

  .utog{display:inline-flex;border-radius:999px;background:var(--surface2);border:1px solid var(--line);padding:2px;}
  .utog button{font-family:var(--mono);font-weight:600;font-size:11px;padding:3px 10px;border:none;background:transparent;color:var(--muted);border-radius:999px;cursor:pointer;}
  .utog button.on{background:var(--accent);color:#fff;}

  .exrow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 12px;margin-bottom:8px;}
  .iconbtn{width:32px;height:32px;border-radius:8px;background:var(--surface2);border:none;display:grid;place-items:center;cursor:pointer;color:var(--muted);}
  .iconbtn.del{color:var(--down);}
  .iconbtn svg{width:15px;height:15px;}

  .addform{padding:14px;margin-top:18px;}
  .addform .ttl{font-size:13px;font-weight:700;margin-bottom:10px;}
  .addform .name{width:100%;font-family:var(--sans);font-size:14px;margin-bottom:10px;}
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .pill{font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;}
  .pill.on{background:var(--accent);color:#fff;border-color:transparent;}
  .adderr{font-size:12px;color:var(--down);margin-bottom:10px;}
  .addbtn{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px;border-radius:11px;background:var(--accent);color:#fff;border:none;font-weight:600;font-size:14px;cursor:pointer;}
  .addbtn svg{width:17px;height:17px;}
  .hint{font-size:11.5px;color:var(--faint);text-align:center;margin-top:16px;line-height:1.5;}

  .statpair{display:flex;gap:8px;margin-bottom:14px;}
  .statbox{flex:1;padding:12px 14px;}
  .statbox .n{font-family:var(--mono);font-weight:700;font-size:22px;}
  .statbox .n.acc{color:var(--accent);}
  .statbox .l{font-size:11px;color:var(--muted);}
  .pcard{padding:14px;margin-bottom:10px;}
  .pcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;}
  .pcard-name{font-weight:600;font-size:14px;}
  .pcard-grp{font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.5px;margin-bottom:5px;}
  .delta{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-weight:600;font-size:15px;}
  .delta .au{color:var(--faint);font-weight:400;}
  .delta-note{font-size:11px;color:var(--faint);margin-top:2px;}
  .pcard-stats{display:flex;gap:8px;border-top:1px solid var(--line);padding-top:10px;}
  .pcard-stats>div{flex:1;}
  .pcard-stats .v{font-family:var(--mono);font-weight:700;font-size:17px;}
  .pcard-stats .v .u{font-size:11px;color:var(--faint);font-weight:400;}
  .pcard-stats .k{font-size:10.5px;color:var(--muted);letter-spacing:.4px;}

  .empty{padding:28px;text-align:center;}
  .empty svg{width:26px;height:26px;color:var(--faint);margin:0 auto 10px;display:block;}
  .empty .t{color:var(--muted);font-size:14px;}
  .empty .s{color:var(--faint);font-size:12px;margin-top:4px;}

  .hcard{padding:13px;margin-bottom:10px;}
  .hcard-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
  .hcard-date{font-weight:600;font-size:14px;}
  .hcard-cnt{font-family:var(--mono);font-size:11.5px;color:var(--accent);}
  .hcard-acts{display:flex;gap:6px;}
  .hentries{border-top:1px solid var(--line);padding-top:8px;}
  .hentry{display:flex;align-items:center;justify-content:space-between;padding:3px 0;font-size:13px;}
  .hentry .ex{color:var(--muted);}
  .hentry .val{font-family:var(--mono);color:var(--text);}
  .hentry .val .r{color:var(--faint);}
  .resetwrap{margin-top:18px;text-align:center;}
  .resetbtn{font-size:12px;color:var(--faint);background:none;border:none;cursor:pointer;padding:8px;}
  .confirm{padding:14px;}
  .confirm .q{font-size:13px;margin-bottom:10px;}
  .confirm .btns{display:flex;gap:8px;}
  .confirm button{flex:1;padding:10px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
  .confirm .keep{background:var(--surface2);color:var(--text);}
  .confirm .delall{background:var(--down);color:#fff;font-weight:700;}

  .nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);}
  .nav-inner{display:flex;max-width:540px;margin:0 auto;}
  .nav button{flex:1;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:9px 0;background:none;border:none;cursor:pointer;color:var(--muted);}
  .nav button.on{color:var(--accent);}
  .nav button span{font-size:11px;font-weight:500;}
  .nav button.on span{font-weight:700;}
  .nav svg{width:20px;height:20px;}

  .loading{padding:60px 0;text-align:center;color:var(--muted);}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div style="position:sticky;top:0;z-index:99999;display:flex;align-items:center;padding:max(8px,env(safe-area-inset-top)) 12px 8px;background:rgba(249,251,251,.94);-webkit-backdrop-filter:saturate(1.1) blur(8px);backdrop-filter:saturate(1.1) blur(8px);border-bottom:1px solid rgba(16,38,46,.08);">
<a href="index.html" style="display:inline-flex;align-items:center;gap:6px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;font-size:14px;font-weight:600;color:#16242B;text-decoration:none;padding:6px 10px 6px 6px;border-radius:10px;">\u2039 All trackers</a>
</div>
<div id="root"><div class="loading">Loading…</div></div>

<script>
(function(){
  "use strict";

  /* ====== constants ====== */
  var DEFAULT_EXERCISES = [
    {name:'Chest Press',group:'Chest'},{name:'Incline Smith Press',group:'Chest'},
    {name:'Wide-Grip Lat Pulldown',group:'Back'},{name:'Close-Grip Cable Row',group:'Back'},{name:'Machine Row',group:'Back'},{name:'Chest-Supported Row',group:'Back'},
    {name:'Shoulder Press',group:'Shoulders'},{name:'Lateral Raises',group:'Shoulders'},{name:'Rear Delt Cable',group:'Shoulders'},
    {name:'Preacher Curl',group:'Arms'},{name:'Bayesian Curl',group:'Arms'},{name:'Hammer Curl',group:'Arms'},{name:'Tricep Pushdown',group:'Arms'},{name:'Overhead Tricep Extension',group:'Arms'},
    {name:'Leg Press',group:'Legs'},{name:'RDL',group:'Legs'},{name:'Hip Thrust',group:'Legs'},{name:'Leg Curl',group:'Legs'},{name:'Leg Extension',group:'Legs'},{name:'Adductor',group:'Legs'},{name:'Calves',group:'Legs'}
  ];
  var GROUP_ORDER = ['Chest','Back','Shoulders','Arms','Legs','Other'];
  var LBS_PER_KG = 2.20462, DAY = 86400000, NS = 'ironlog:';

  /* ====== helpers ====== */
  function pad(n){return String(n).padStart(2,'0');}
  function todayStr(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
  function dateToMs(s){return new Date(s+'T00:00:00').getTime();}
  function uid(){return Date.now()+'-'+Math.random().toString(36).slice(2,7);}
  function fmt(n){if(n==null||isNaN(n))return '—';var r=Math.round(n*10)/10;return Number.isInteger(r)?String(r):r.toFixed(1);}
  function convert(w,from,to){return from===to?w:(to==='kg'?w/LBS_PER_KG:w*LBS_PER_KG);}
  function prettyDate(s){return new Date(s+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function lget(k,def){try{var v=localStorage.getItem(NS+k);return v?JSON.parse(v):def;}catch(e){return def;}}
  function lset(k,v){try{localStorage.setItem(NS+k,JSON.stringify(v));}catch(e){}}

  function svg(name){
    var p={
      dumbbell:'<path d="M6 9v6M3 10v4M18 9v6M21 10v4M6 12h12"/>',
      bars:'<path d="M4 20V10M10 20V4M16 20v-8M4 20h16"/>',
      clip:'<rect x="6" y="4" width="12" height="16" rx="2"/><path d="M9 4V3h6v1M9 9h6M9 13h6M9 17h4"/>',
      trash:'<path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13M10 11v6M14 11v6"/>',
      pencil:'<path d="M4 20h4L19 9l-4-4L4 16v4zM14 6l4 4"/>',
      plus:'<path d="M12 5v14M5 12h14"/>'
    }[name];
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';
  }

  /* ====== state ====== */
  var workouts=[], units={}, exercises=DEFAULT_EXERCISES.slice();
  var tab='log', logDate=todayStr(), draft={}, editMode=false, newGroup='Chest', newName='', addError='', confirmReset=false, loaded=false;
  var saveTimer=null;

  function groupMap(){var m={};exercises.forEach(function(e){m[e.name]=e.group;});return m;}
  function buildDraft(session){var d={};if(session)session.entries.forEach(function(e){d[e.exercise]={weight:String(e.weight),reps:e.reps!=null?String(e.reps):''};});return d;}

  /* ====== persistence of the log draft (auto-save) ====== */
  function commitDraft(){
    var names=exercises.map(function(e){return e.name;});
    var entries=names.filter(function(ex){return draft[ex]&&draft[ex].weight!==''&&draft[ex].weight!=null&&!isNaN(Number(draft[ex].weight));})
      .map(function(ex){return {exercise:ex,weight:Number(draft[ex].weight),unit:units[ex]||'kg',reps:(draft[ex].reps&&!isNaN(Number(draft[ex].reps)))?Number(draft[ex].reps):null};});
    var existing=workouts.filter(function(w){return w.date===logDate;})[0];
    if(entries.length===0){ if(existing) workouts=workouts.filter(function(w){return w.date!==logDate;}); }
    else { var session={id:existing?existing.id:uid(),date:logDate,entries:entries}; workouts=workouts.filter(function(w){return w.date!==logDate;}).concat(session); }
    lset('workouts',workouts);
  }
  function setStatus(s){var el=document.getElementById('saveStatus');if(el&&!editMode)el.textContent=(s==='saving')?'Saving…':'✓ All changes saved';}
  function scheduleSave(){setStatus('saving');if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(function(){saveTimer=null;commitDraft();setStatus('saved');},500);}
  function flushSave(){if(saveTimer){clearTimeout(saveTimer);saveTimer=null;commitDraft();}}

  function lastEntryFor(ex){
    var best=null;
    workouts.forEach(function(w){
      if(w.date===logDate)return;
      var e=w.entries.filter(function(en){return en.exercise===ex;})[0];
      if(e){var t=dateToMs(w.date);if(!best||t>best.t)best={t:t,weight:convert(e.weight,e.unit||'kg',units[ex]||'kg'),reps:e.reps,date:w.date};}
    });
    return best;
  }

  function computeStats(){
    var now=dateToMs(todayStr()),out={};
    exercises.forEach(function(item){
      var ex=item.name,u=units[ex]||'kg',entries=[];
      workouts.forEach(function(w){var e=w.entries.filter(function(en){return en.exercise===ex;})[0];if(e)entries.push({t:dateToMs(w.date),weight:convert(e.weight,e.unit||'kg',u)});});
      entries.sort(function(a,b){return a.t-b.t;});
      function avg(arr){return arr.length?arr.reduce(function(s,e){return s+e.weight;},0)/arr.length:null;}
      var tw=avg(entries.filter(function(e){return e.t>=now-6*DAY;}));
      var lw=avg(entries.filter(function(e){return e.t>=now-13*DAY&&e.t<=now-7*DAY;}));
      out[ex]={unit:u,count:entries.length,last:entries.length?entries[entries.length-1]:null,
        sevenDay:avg(entries.filter(function(e){return e.t>=now-6*DAY;})),
        monthly:avg(entries.filter(function(e){return e.t>=now-29*DAY;})),
        wow:(tw!=null&&lw!=null)?tw-lw:null,
        trend:entries.slice(-12).map(function(e){return e.weight;})};
    });
    return out;
  }

  function sparkline(data){
    if(!data||data.length<2)return '';
    var w=76,h=26,p=3,min=Math.min.apply(null,data),max=Math.max.apply(null,data),rng=(max-min)||1;
    var pts=data.map(function(v,i){return [p+(i/(data.length-1))*(w-2*p),h-p-((v-min)/rng)*(h-2*p)];});
    var d='M'+pts.map(function(pt){return pt[0].toFixed(1)+','+pt[1].toFixed(1);}).join(' L');
    var col=data[data.length-1]>=data[0]?'var(--up)':'var(--down)';var last=pts[pts.length-1];
    return '<svg width="'+w+'" height="'+h+'" style="display:block"><path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="2.2" fill="'+col+'"/></svg>';
  }
  function deltaHTML(value,unit){
    if(value==null)return '<span class="delta" style="color:var(--faint);font-size:12px">no prior week</span>';
    var flat=Math.abs(value)<0.05,up=value>0;
    var col=flat?'var(--muted)':up?'var(--up)':'var(--down)';
    var arw=flat?'→':up?'▲':'▼';var sign=flat?'':up?'+':'−';
    return '<span class="delta" style="color:'+col+'">'+arw+' '+sign+fmt(Math.abs(value))+'<span class="au">'+unit+'</span></span>';
  }
  function unitToggle(ex){
    var cur=units[ex]||'kg';
    return '<span class="utog">'+['kg','lb'].map(function(u){var v=u==='lb'?'lbs':'kg';var on=cur===v;return '<button'+(on?' class="on"':'')+' data-action="unit" data-ex="'+esc(ex)+'" data-u="'+v+'">'+u.toUpperCase()+'</button>';}).join('')+'</span>';
  }

  function groupsToShow(){return GROUP_ORDER.map(function(g){return {name:g,items:exercises.filter(function(e){return e.group===g;})};}).filter(function(g){return g.items.length>0;});}

  /* ====== views ====== */
  function headerHTML(){
    return '<div class="head"><div class="logo">'+svg('dumbbell')+'</div><div><div class="brand">IRONLOG</div><div class="brand-sub">Strength tracker</div></div></div>';
  }
  function navHTML(){
    var items=[['log','dumbbell','Log'],['progress','bars','Progress'],['history','clip','History']];
    return '<div class="nav"><div class="nav-inner">'+items.map(function(it){var on=tab===it[0];return '<button'+(on?' class="on"':'')+' data-action="tab" data-tab="'+it[0]+'">'+svg(it[1])+'<span>'+it[2]+'</span></button>';}).join('')+'</div></div>';
  }

  function renderLog(){
    var h='';
    h+='<div class="card daterow"><label>Date</label><input type="date" id="logDate" class="input" value="'+logDate+'" max="'+todayStr()+'"></div>';
    h+='<div class="statusrow"><span id="saveStatus">'+(editMode?'Add or remove exercises':'✓ All changes saved')+'</span><button class="editbtn" data-action="toggleEdit">'+(editMode?'Done':'Edit')+'</button></div>';

    groupsToShow().forEach(function(g){
      h+='<div class="grouphd"><span class="g">'+g.name.toUpperCase()+'</span><div class="ln"></div></div>';
      g.items.forEach(function(item){
        var ex=item.name;
        if(editMode){
          h+='<div class="card exrow"><span class="exc-name">'+esc(ex)+'</span><button class="iconbtn del" data-action="delEx" data-ex="'+esc(ex)+'" aria-label="Delete">'+svg('trash')+'</button></div>';
          return;
        }
        var last=lastEntryFor(ex),cur=units[ex]||'kg';
        var wv=(draft[ex]&&draft[ex].weight!=null)?draft[ex].weight:'';
        var rv=(draft[ex]&&draft[ex].reps!=null)?draft[ex].reps:'';
        h+='<div class="card exc">'
          +'<div class="exc-top"><span class="exc-name">'+esc(ex)+'</span>'+unitToggle(ex)+'</div>'
          +'<div class="exc-in"><div class="exc-w"><input class="input" inputmode="decimal" type="number" data-ex="'+esc(ex)+'" data-field="weight" value="'+esc(wv)+'" placeholder="'+(last?esc(fmt(last.weight)):'weight')+'"><span class="u">'+cur+'</span></div>'
          +'<input class="input exc-reps" inputmode="numeric" type="number" data-ex="'+esc(ex)+'" data-field="reps" value="'+esc(rv)+'" placeholder="reps"></div>'
          +(last?('<div class="exc-last">Last · '+fmt(last.weight)+' '+cur+(last.reps?(' × '+last.reps):'')+' · '+prettyDate(last.date)+'</div>'):'')
          +'</div>';
      });
    });

    if(editMode){
      h+='<div class="card addform"><div class="ttl">Add an exercise</div>'
        +'<input id="newName" class="input name" value="'+esc(newName)+'" placeholder="Exercise name">'
        +'<div class="pills">'+GROUP_ORDER.map(function(g){return '<button class="pill'+(newGroup===g?' on':'')+'" data-action="group" data-g="'+g+'">'+g+'</button>';}).join('')+'</div>'
        +(addError?'<div class="adderr">'+esc(addError)+'</div>':'')
        +'<button class="addbtn" data-action="addEx">'+svg('plus')+' Add exercise</button></div>';
    } else {
      h+='<div class="hint">Logs save automatically as you type — enter one exercise at a time, even mid-workout.</div>';
    }
    return h;
  }

  function renderProgress(){
    var stats=computeStats(),gm=groupMap(),now=dateToMs(todayStr());
    var weekCount=workouts.filter(function(w){return dateToMs(w.date)>=now-6*DAY;}).length;
    var trained=exercises.map(function(i){return i.name;}).filter(function(ex){return stats[ex]&&stats[ex].count>0;})
      .sort(function(a,b){return (stats[b].last?stats[b].last.t:0)-(stats[a].last?stats[a].last.t:0);});
    var h='<div class="statpair"><div class="card statbox"><div class="n acc">'+weekCount+'</div><div class="l">sessions · last 7 days</div></div>'
      +'<div class="card statbox"><div class="n">'+workouts.length+'</div><div class="l">sessions · all time</div></div></div>';
    if(trained.length===0){
      h+='<div class="card empty">'+svg('bars')+'<div class="t">No lifts logged yet.</div><div class="s">Log a session and your averages and weekly change show up here.</div></div>';
      return h;
    }
    trained.forEach(function(ex){
      var s=stats[ex];
      h+='<div class="card pcard"><div class="pcard-top"><div style="min-width:0">'
        +'<div class="pcard-name">'+esc(ex)+'</div><div class="pcard-grp">'+esc((gm[ex]||'').toUpperCase())+'</div>'
        +deltaHTML(s.wow,s.unit)+'<div class="delta-note">vs. previous week</div></div>'+sparkline(s.trend)+'</div>'
        +'<div class="pcard-stats">'
        +'<div><div class="v">'+fmt(s.sevenDay)+' <span class="u">'+s.unit+'</span></div><div class="k">7-DAY AVG</div></div>'
        +'<div><div class="v">'+fmt(s.monthly)+' <span class="u">'+s.unit+'</span></div><div class="k">30-DAY AVG</div></div>'
        +'<div><div class="v">'+fmt(s.last?s.last.weight:null)+' <span class="u">'+s.unit+'</span></div><div class="k">LATEST</div></div>'
        +'</div></div>';
    });
    return h;
  }

  function renderHistory(){
    if(workouts.length===0){
      return '<div class="card empty">'+svg('clip')+'<div class="t">No sessions logged.</div><div class="s">Head to Log to record your first workout.</div></div>';
    }
    var sorted=workouts.slice().sort(function(a,b){return dateToMs(b.date)-dateToMs(a.date);});
    var h='';
    sorted.forEach(function(w){
      h+='<div class="card hcard"><div class="hcard-top"><div><div class="hcard-date">'+prettyDate(w.date)+'</div><div class="hcard-cnt">'+w.entries.length+' exercise'+(w.entries.length!==1?'s':'')+'</div></div>'
        +'<div class="hcard-acts"><button class="iconbtn" data-action="editSession" data-id="'+w.id+'" aria-label="Edit">'+svg('pencil')+'</button><button class="iconbtn del" data-action="delSession" data-id="'+w.id+'" aria-label="Delete">'+svg('trash')+'</button></div></div>'
        +'<div class="hentries">'+w.entries.map(function(e){return '<div class="hentry"><span class="ex">'+esc(e.exercise)+'</span><span class="val">'+fmt(e.weight)+' '+e.unit+(e.reps?('<span class="r"> × '+e.reps+'</span>'):'')+'</span></div>';}).join('')+'</div></div>';
    });
    h+='<div class="resetwrap">'+(confirmReset
      ?('<div class="card confirm"><div class="q">Delete every logged session? This can\'t be undone.</div><div class="btns"><button class="keep" data-action="cancelReset">Keep my data</button><button class="delall" data-action="doReset">Delete all</button></div></div>')
      :('<button class="resetbtn" data-action="askReset">Reset all data</button>'))+'</div>';
    return h;
  }

  function render(){
    var root=document.getElementById('root');
    if(!loaded){root.innerHTML='<div class="loading">Loading…</div>';return;}
    var body= tab==='log'?renderLog() : tab==='progress'?renderProgress() : renderHistory();
    root.innerHTML='<div class="app">'+headerHTML()+body+'</div>'+navHTML();
  }

  /* ====== actions ====== */
  function changeDate(d){flushSave();logDate=d;draft=buildDraft(workouts.filter(function(w){return w.date===d;})[0]);render();}

  function onClick(e){
    var b=e.target.closest('[data-action]');if(!b)return;
    var a=b.getAttribute('data-action');
    if(a==='tab'){var nt=b.getAttribute('data-tab');if(tab==='log'&&nt!=='log')flushSave();tab=nt;if(nt!=='log'){editMode=false;}render();window.scrollTo(0,0);}
    else if(a==='toggleEdit'){editMode=!editMode;addError='';render();}
    else if(a==='unit'){var ex=b.getAttribute('data-ex');units[ex]=b.getAttribute('data-u');lset('units',units);render();}
    else if(a==='delEx'){var x=b.getAttribute('data-ex');exercises=exercises.filter(function(e){return e.name!==x;});delete draft[x];lset('exercises',exercises);render();}
    else if(a==='group'){newGroup=b.getAttribute('data-g');render();}
    else if(a==='addEx'){
      var input=document.getElementById('newName');var nm=input?input.value.trim():'';
      if(!nm){return;}
      if(exercises.some(function(e){return e.name.toLowerCase()===nm.toLowerCase();})){addError='That exercise already exists.';render();return;}
      exercises=exercises.concat([{name:nm,group:newGroup}]);newName='';addError='';lset('exercises',exercises);render();
    }
    else if(a==='delSession'){var id=b.getAttribute('data-id');workouts=workouts.filter(function(w){return w.id!==id;});lset('workouts',workouts);render();}
    else if(a==='editSession'){flushSave();var sid=b.getAttribute('data-id');var s=workouts.filter(function(w){return w.id===sid;})[0];if(s){logDate=s.date;draft=buildDraft(s);editMode=false;tab='log';render();window.scrollTo(0,0);}}
    else if(a==='askReset'){confirmReset=true;render();}
    else if(a==='cancelReset'){confirmReset=false;render();}
    else if(a==='doReset'){workouts=[];draft={};confirmReset=false;lset('workouts',workouts);render();}
  }
  function onInput(e){
    var t=e.target;
    if(t.dataset&&t.dataset.field){var ex=t.dataset.ex;var cur=draft[ex]||{};var nx={weight:cur.weight,reps:cur.reps};nx[t.dataset.field]=t.value;draft[ex]=nx;scheduleSave();}
    else if(t.id==='newName'){newName=t.value;addError='';}
  }
  function onChange(e){if(e.target.id==='logDate')changeDate(e.target.value);}

  /* ====== init ====== */
  function init(){
    var w=lget('workouts',[]);workouts=Array.isArray(w)?w:[];
    var u=lget('units',{});units=(u&&typeof u==='object')?u:{};
    var ex=lget('exercises',null);exercises=(Array.isArray(ex)&&ex.length)?ex:DEFAULT_EXERCISES.slice();
    draft=buildDraft(workouts.filter(function(x){return x.date===todayStr();})[0]);
    loaded=true;
    var root=document.getElementById('root');
    root.addEventListener('click',onClick);
    root.addEventListener('input',onInput);
    root.addEventListener('change',onChange);
    render();
  }
  init();
})();
</script>

<script>
/* ---- home-screen icon (generated, no external files) ---- */
(function(){
  function rr(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}
  function mk(s){
    var c=document.createElement('canvas');c.width=s;c.height=s;var x=c.getContext('2d');
    rr(x,0,0,s,s,s*0.22);x.fillStyle='#2563EB';x.fill();
    x.strokeStyle='#fff';x.lineCap='round';var y=s*0.5;
    x.lineWidth=s*0.06;x.beginPath();x.moveTo(s*0.3,y);x.lineTo(s*0.7,y);x.stroke();
    x.lineWidth=s*0.055;[0.27,0.73].forEach(function(px){x.beginPath();x.moveTo(s*px,y-s*0.12);x.lineTo(s*px,y+s*0.12);x.stroke();});
    [0.21,0.79].forEach(function(px){x.beginPath();x.moveTo(s*px,y-s*0.075);x.lineTo(s*px,y+s*0.075);x.stroke();});
    return c.toDataURL('image/png');
  }
  try{
    var a=document.createElement('link');a.rel='apple-touch-icon';a.href=mk(180);document.head.appendChild(a);
    var f=document.createElement('link');f.rel='icon';f.href=mk(64);document.head.appendChild(f);
    var m={name:'IRONLOG',short_name:'IRONLOG',display:'standalone',background_color:'#F4F7FC',theme_color:'#F4F7FC',start_url:'.',icons:[{src:mk(192),sizes:'192x192',type:'image/png'},{src:mk(512),sizes:'512x512',type:'image/png'}]};
    var mb=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});var ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(mb);document.head.appendChild(ml);
  }catch(e){}
})();
</script>
